name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true

env:
  CARGO_TERM_COLOR: always

# ─────────────────────────────────────────────────────────────────────────────
# Publish ownership (one canonical publisher per package name — no dual-publish):
#
#   npm  @zap-proto/zapc   -> OWNED BY zap-proto/rust (npm/, tag `zapc-v*`).
#        That is the binary-downloader live at 1.0.0 and what `npx @zap-proto/zapc`
#        runs. This repo must NOT publish @zap-proto/zapc — the former
#        `npm-packages` job (optionalDependencies + 5 @zap-proto/zapc-<plat>
#        packages) was removed to stop the name collision. The matching dead
#        `npm/` directory was deleted in the same commit.
#
#   PyPI zap-proto          -> OWNED BY zap-proto/py (live 1.2.0). This repo must
#        NOT publish zap-proto — the `reserve/zap-proto-py` publish step was
#        removed so a future spec bump can never clobber py/'s real package.
#
# This repo (zap-proto/spec) remains the sole publisher of its OWN names only:
#   crates.io zap-schema  +  PyPI zap-schema  (the schema-compiler package).
# `zap-proto` / `zap-protocol` registry names are held as static reservations
# (the reserve/ dirs); they are intentionally NOT auto-published from here.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - target: aarch64-apple-darwin
            os: macos-14
            platform: darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-13
            platform: darwin-x64

          # Linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-arm64
            cross: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-x64

          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform: win32-x64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin zapc
          else
            cargo build --release --target ${{ matrix.target }} --bin zapc
          fi
        shell: bash

      - name: Package binary
        run: |
          mkdir -p dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/zapc.exe dist/zapc-${{ matrix.platform }}.exe
          else
            cp target/${{ matrix.target }}/release/zapc dist/zapc-${{ matrix.platform }}
            chmod +x dist/zapc-${{ matrix.platform }}
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zapc-${{ matrix.platform }}
          path: dist/zapc-${{ matrix.platform }}${{ matrix.ext }}

  # NOTE: the npm publish job was intentionally REMOVED. `@zap-proto/zapc`
  # (and its 5 platform sub-packages) is published exclusively from
  # zap-proto/rust (npm/, tag `zapc-v*`). See the ownership banner above.

  # Create GitHub release
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/zapc-*; do
            for file in "$dir"/*; do
              cp "$file" release/
            done
          done
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ZAP v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: release/*
          body: |
            ## ZAP v${{ steps.version.outputs.version }}

            ### Installation

            **npm (recommended)**
            ```bash
            npm install -g @zap-proto/zapc
            ```

            **Cargo**
            ```bash
            cargo install zap-proto
            ```

            **Direct download**
            Download the appropriate binary for your platform from the assets below.

            ### Changes
            See [CHANGELOG.md](https://github.com/zap-proto/zap/blob/main/CHANGELOG.md) for details.

  # Publish to crates.io (main crate and aliases)
  crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish zap-schema (main crate)
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

      - name: Publish zap-proto alias
        working-directory: reserve/zap-proto
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

      - name: Publish zap-protocol alias
        working-directory: reserve/zap-protocol
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

  # Publish to PyPI (main package and aliases)
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Update version in pyproject.toml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/version = \".*\"/version = \"${VERSION}\"/" python/pyproject.toml

      - name: Build and publish zap-schema
        working-directory: python
        run: |
          uv build
          uv publish --token ${{ secrets.PYPI_TOKEN }}
        continue-on-error: true

      # NOTE: the `zap-proto` PyPI publish step was intentionally REMOVED.
      # PyPI `zap-proto` is published exclusively from zap-proto/py (live 1.2.0).
      # Auto-publishing it from here risked a future spec bump clobbering py/'s
      # real package. The `zap-protocol` PyPI step was likewise removed — that
      # name is held as a static reservation, not auto-published. See banner.
